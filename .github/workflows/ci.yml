name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenlens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tokenlens/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  rust-test:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenlens/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.77.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tokenlens/src-tauri -> target
      - run: cargo test --lib --all-features

name: Release (Windows only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Materialize the minisign private key as a file. GitHub secrets are often
      # stored as base64 to preserve newlines; raw multiline content also works.
      - name: Setup Tauri signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is not set."
          }

          $keyDir = Join-Path $env:USERPROFILE '.tauri'
          New-Item -ItemType Directory -Force -Path $keyDir | Out-Null
          $keyPath = Join-Path $keyDir 'tokenlens.key'
          $raw = $env:TAURI_SIGNING_PRIVATE_KEY.Trim()

          if ($raw.StartsWith('untrusted comment:')) {
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            [System.IO.File]::WriteAllText($keyPath, $raw, $utf8NoBom)
          } else {
            try {
              $bytes = [Convert]::FromBase64String($raw)
              [System.IO.File]::WriteAllBytes($keyPath, $bytes)
            } catch {
              throw @"
          TAURI_SIGNING_PRIVATE_KEY is not a valid minisign private key.
          Use the full contents of the .key file generated by:
            npm run tauri signer generate -w tokenlens.key
          Do NOT use the pubkey value from tauri.conf.json.
          For GitHub secrets, base64-encoding the key file is recommended:
            [Convert]::ToBase64String([IO.File]::ReadAllBytes('tokenlens.key'))
          "@
            }
          }

          $keyText = [System.IO.File]::ReadAllText($keyPath)
          if ($keyText -notmatch 'untrusted comment:') {
            throw "Signing key file is missing the required minisign comment header."
          }
          if ($keyText -match 'minisign public key') {
            throw "TAURI_SIGNING_PRIVATE_KEY contains the public key, not the private key."
          }

          "TAURI_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TokenLens ${{ github.ref_name }}'
          releaseBody: 'Windows installer for TokenLens ${{ github.ref_name }}.'
          releaseDraft: false
          prerelease: false

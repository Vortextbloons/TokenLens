name: Release (Windows only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Materialize the minisign private key as a file. Accepts:
      # - raw minisign text (starts with "untrusted comment:")
      # - base64 of minisign text (contents of ~/.tauri/*.key from tauri signer generate)
      # - base64 of the key file bytes (legacy double-encoding also works)
      - name: Setup Tauri signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is not set."
          }

          function Resolve-MinisignKeyText([string]$Input) {
            $candidate = $Input.Trim()

            if ($candidate.StartsWith('untrusted comment:')) {
              return $candidate
            }

            for ($i = 0; $i -lt 2; $i++) {
              try {
                $decoded = [Text.Encoding]::UTF8.GetString(
                  [Convert]::FromBase64String($candidate)
                ).Trim()
              } catch {
                break
              }

              if ($decoded.StartsWith('untrusted comment:')) {
                return $decoded
              }

              $candidate = $decoded
            }

            throw @"
          TAURI_SIGNING_PRIVATE_KEY is not a valid minisign private key.
          Paste the contents of the .key file from:
            npm run tauri signer generate -w tokenlens.key
          Do NOT use the pubkey from tauri.conf.json.
          PowerShell to copy the correct value:
            Get-Content `"`$env:USERPROFILE\.tauri\tokenlens.key`" -Raw | Set-Clipboard
          "@
          }

          $keyDir = Join-Path $env:USERPROFILE '.tauri'
          New-Item -ItemType Directory -Force -Path $keyDir | Out-Null
          $keyPath = Join-Path $keyDir 'tokenlens.key'
          $keyText = Resolve-MinisignKeyText $env:TAURI_SIGNING_PRIVATE_KEY

          if ($keyText -match 'minisign public key') {
            throw "TAURI_SIGNING_PRIVATE_KEY contains the public key, not the private key."
          }

          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($keyPath, $keyText, $utf8NoBom)
          "TAURI_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TokenLens ${{ github.ref_name }}'
          releaseBody: 'Windows installer for TokenLens ${{ github.ref_name }}.'
          releaseDraft: false
          prerelease: false
